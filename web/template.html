<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ロト6">
  <meta name="theme-color" content="#007aff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a84ff" media="(prefers-color-scheme: dark)">
  <meta name="format-detection" content="telephone=no">
  <title>ロト6 予想番号</title>
  <!--APPLE_CSS_PLACEHOLDER-->
</head>
<body class="apple-body">
  <div class="apple-container">
    <div class="hero-wrap">
      <div class="hero-badge">● どこでも使える</div>
      <h1 class="main-title">ロト6 予想番号</h1>
      <p class="hero-subtitle">インストール不要 — iPhoneに追加してアプリのように使えます</p>
    </div>

    <div class="apple-notice">
      宝くじは完全なランダム抽選です。このツールは参考情報であり、当選を保証するものではありません。
    </div>

    <div class="apple-metrics">
      <div class="apple-metric"><div class="label">分析回数</div><div class="value" id="meta-rounds">-</div></div>
      <div class="apple-metric"><div class="label">最新回</div><div class="value" id="meta-latest-round">-</div></div>
      <div class="apple-metric"><div class="label">抽選日</div><div class="value" id="meta-latest-date">-</div></div>
      <div class="apple-metric"><div class="label">データ更新</div><div class="value" id="meta-updated" style="font-size:0.85rem">-</div></div>
    </div>

    <div class="apple-card" id="ai-tip-card" style="display:none">
      <h2>AI検証済み本命（クラウド自動更新）</h2>
      <p class="hint" id="ai-tip-meta"></p>
      <div class="ball-row" id="ai-tip-balls"></div>
      <p style="text-align:center;font-size:0.875rem;color:var(--label-secondary)" id="ai-tip-copy"></p>
      <div id="ai-tip-pool" style="margin-top:10px;font-size:0.8125rem;color:var(--label-secondary)"></div>
    </div>

    <div class="apple-card">
      <h2>最新当選番号</h2>
      <div class="ball-row" id="latest-balls"></div>
      <p style="text-align:center;font-size:0.875rem;color:var(--label-secondary)" id="latest-bonus"></p>
    </div>

    <div class="apple-tabs">
      <button class="apple-tab active" data-panel="panel-predict">予想番号</button>
      <button class="apple-tab" data-panel="panel-stats">統計グラフ</button>
    </div>

    <div id="panel-predict" class="tab-panel active">
      <div class="apple-card">
        <h2>予想法を選んでください</h2>
        <div class="apple-action-row">
          <button class="apple-btn apple-btn-primary" id="btn-recommend">おすすめ（複合スコア）</button>
          <button class="apple-btn" id="btn-all">全手法まとめて表示</button>
          <button class="apple-btn" id="btn-reroll">番号を再生成</button>
        </div>
        <div class="apple-btn-grid" id="strategy-buttons"></div>
        <div id="results"><p class="hint">上のボタンを押すと予想番号が表示されます</p></div>
      </div>
    </div>

    <div id="panel-stats" class="tab-panel">
      <div class="apple-card">
        <h2>数字の出現傾向</h2>
        <div class="chart-grid">
          <div><h2 style="font-size:0.875rem;font-weight:600;margin-bottom:10px">全体 TOP20</h2><div id="chart-all"></div></div>
          <div><h2 style="font-size:0.875rem;font-weight:600;margin-bottom:10px">直近50回 TOP20</h2><div id="chart-recent"></div></div>
        </div>
        <h2 style="font-size:0.875rem;font-weight:600;margin:16px 0 10px">全番号の出現回数</h2>
        <div id="chart-heat"></div>
        <div class="chart-grid" style="margin-top:16px">
          <div>
            <h2 style="font-size:0.875rem;font-weight:600;margin-bottom:10px">出遅れ TOP15</h2>
            <table><thead><tr><th>番号</th><th>経過</th></tr></thead><tbody id="overdue-table"></tbody></table>
          </div>
          <div>
            <h2 style="font-size:0.875rem;font-weight:600;margin-bottom:10px">奇数個数の分布 (%)</h2>
            <div id="chart-odd"></div>
          </div>
        </div>
        <p id="sum-stats" style="margin-top:14px;font-size:0.8125rem;color:var(--label-secondary)"></p>
      </div>
    </div>

    <footer class="apple-footer">データ出典: loto6.thekyo.jp（個人利用）｜<!--DATA_SOURCE--></footer>
  </div>

  <!--LOTODATA_PLACEHOLDER-->
  <!--APPJS_PLACEHOLDER-->
</body>
</html>
