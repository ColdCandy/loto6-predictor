<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ロト6 予想番号</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
      background: linear-gradient(135deg, #fff5f5 0%, #f8f9fa 100%);
      color: #212529;
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 40px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; color: #c92a2a; font-size: 1.6rem; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #868e96; font-size: 0.9rem; margin-bottom: 16px; }
    .notice {
      background: #fff3bf; border: 1px solid #ffd43b; border-radius: 8px;
      padding: 10px 14px; font-size: 0.85rem; margin-bottom: 16px;
    }
    .metrics {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px; margin-bottom: 16px;
    }
    .metric {
      background: white; border-radius: 10px; padding: 12px; text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .metric .label { font-size: 0.75rem; color: #868e96; }
    .metric .value { font-size: 1.1rem; font-weight: bold; color: #c92a2a; }
    .card {
      background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px;
    }
    .card h2 { font-size: 1rem; margin-bottom: 12px; color: #495057; }
    .ball {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; margin: 3px; border-radius: 50%;
      background: linear-gradient(145deg, #ff6b6b, #c92a2a);
      color: white; font-size: 16px; font-weight: bold;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }
    @media (max-width: 480px) { .ball { width: 38px; height: 38px; font-size: 14px; } }
    .ball-row { text-align: center; padding: 8px 0; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tab {
      flex: 1; min-width: 120px; padding: 10px; border: none; border-radius: 8px;
      background: #e9ecef; cursor: pointer; font-size: 0.95rem; font-weight: 600;
    }
    .tab.active { background: #c92a2a; color: white; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .btn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 12px; }
    .btn {
      padding: 10px 8px; border: 2px solid #dee2e6; border-radius: 8px;
      background: white; cursor: pointer; font-size: 0.82rem; transition: all 0.15s;
    }
    .btn:hover { border-color: #c92a2a; background: #fff5f5; }
    .btn-primary { background: #c92a2a; color: white; border-color: #c92a2a; font-weight: bold; }
    .btn-primary:hover { background: #a61e1e; }
    .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .action-row .btn { flex: 1; min-width: 140px; }
    .result-box {
      background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px;
      padding: 14px; margin-bottom: 10px;
    }
    .result-box h3 { font-size: 0.95rem; margin-bottom: 4px; }
    .result-box .desc { font-size: 0.8rem; color: #868e96; margin-bottom: 8px; }
    .copy-text { font-size: 0.85rem; color: #2b8a3e; margin-top: 8px; font-weight: 600; }
    .eliminated { font-size: 0.75rem; color: #868e96; margin-top: 4px; }
    .hint { text-align: center; color: #868e96; padding: 24px; font-size: 0.9rem; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 0.8rem; }
    .bar-label { width: 36px; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 16px; background: #e9ecef; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #ff6b6b, #c92a2a); border-radius: 4px; }
    .bar-value { width: 32px; text-align: right; flex-shrink: 0; color: #868e96; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .chart-grid { grid-template-columns: 1fr; } }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 6px 10px; border-bottom: 1px solid #dee2e6; text-align: left; }
    th { background: #f8f9fa; }
    footer { text-align: center; font-size: 0.75rem; color: #adb5bd; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎱 ロト6 予想番号</h1>
    <p class="subtitle">インストール不要・オフライン対応</p>

    <div class="notice">
      宝くじは完全なランダム抽選です。このツールは参考情報であり、当選を保証するものではありません。
    </div>

    <div class="metrics">
      <div class="metric"><div class="label">分析回数</div><div class="value" id="meta-rounds">-</div></div>
      <div class="metric"><div class="label">最新回</div><div class="value" id="meta-latest-round">-</div></div>
      <div class="metric"><div class="label">抽選日</div><div class="value" id="meta-latest-date">-</div></div>
      <div class="metric"><div class="label">データ更新</div><div class="value" id="meta-updated" style="font-size:0.85rem">-</div></div>
    </div>

    <div class="card">
      <h2>📋 最新当選番号</h2>
      <div class="ball-row" id="latest-balls"></div>
      <p style="text-align:center;font-size:0.9rem" id="latest-bonus"></p>
    </div>

    <div class="tabs">
      <button class="tab active" data-panel="panel-predict">🎯 予想番号</button>
      <button class="tab" data-panel="panel-stats">📊 統計グラフ</button>
    </div>

    <div id="panel-predict" class="tab-panel active">
      <div class="card">
        <h2>予想法を選んでボタンを押してください</h2>
        <div class="action-row">
          <button class="btn btn-primary" id="btn-recommend">✨ おすすめ（複合スコア）</button>
          <button class="btn" id="btn-all">📋 全手法まとめて表示</button>
          <button class="btn" id="btn-reroll">🔀 番号を再生成</button>
        </div>
        <div class="btn-grid" id="strategy-buttons"></div>
        <div id="results"><p class="hint">👆 上のボタンを押すと予想番号が表示されます</p></div>
      </div>
    </div>

    <div id="panel-stats" class="tab-panel">
      <div class="card">
        <h2>📊 数字の出現傾向</h2>
        <div class="chart-grid">
          <div><h2 style="font-size:0.9rem">全体 TOP20</h2><div id="chart-all"></div></div>
          <div><h2 style="font-size:0.9rem">直近50回 TOP20</h2><div id="chart-recent"></div></div>
        </div>
        <h2 style="font-size:0.9rem;margin-top:16px">全番号の出現回数</h2>
        <div id="chart-heat"></div>
        <div class="chart-grid" style="margin-top:16px">
          <div>
            <h2 style="font-size:0.9rem">出遅れ TOP15</h2>
            <table><thead><tr><th>番号</th><th>経過</th></tr></thead><tbody id="overdue-table"></tbody></table>
          </div>
          <div>
            <h2 style="font-size:0.9rem">奇数個数の分布 (%)</h2>
            <div id="chart-odd"></div>
          </div>
        </div>
        <p id="sum-stats" style="margin-top:12px;font-size:0.85rem"></p>
      </div>
    </div>

    <footer>データ出典: loto6.thekyo.jp（個人利用）｜<!--DATA_SOURCE--></footer>
  </div>

  <!--LOTODATA_PLACEHOLDER-->
  <!--APPJS_PLACEHOLDER-->
</body>
</html>
