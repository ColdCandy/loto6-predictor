<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>ロト6 予想番号</title>
  <style>
/* Apple Human Interface Guidelines 準拠デザインシステム */

:root {
  color-scheme: light dark;

  /* SF / Apple System Colors - Light */
  --bg-primary: #f5f5f7;
  --bg-secondary: rgba(255, 255, 255, 0.78);
  --bg-tertiary: rgba(255, 255, 255, 0.55);
  --bg-grouped: #ffffff;
  --label-primary: #1d1d1f;
  --label-secondary: #86868b;
  --label-tertiary: #aeaeb2;
  --separator: rgba(60, 60, 67, 0.12);
  --fill-quaternary: rgba(116, 116, 128, 0.08);

  --system-blue: #007aff;
  --system-blue-pressed: #0071e3;
  --system-green: #34c759;
  --system-orange: #ff9500;
  --system-red: #ff3b30;
  --system-gray: #8e8e93;

  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --radius-xl: 22px;
  --radius-pill: 980px;

  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
  --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);

  --blur-material: saturate(180%) blur(20px);
  --spring: cubic-bezier(0.34, 1.2, 0.64, 1);
  --ease: cubic-bezier(0.25, 0.1, 0.25, 1);

  --ball-gradient: linear-gradient(145deg, #ff6b6b 0%, #e03131 100%);
  --mesh-1: rgba(0, 122, 255, 0.08);
  --mesh-2: rgba(52, 199, 89, 0.06);
  --mesh-3: rgba(255, 149, 0, 0.05);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #000000;
    --bg-secondary: rgba(28, 28, 30, 0.82);
    --bg-tertiary: rgba(44, 44, 46, 0.72);
    --bg-grouped: #1c1c1e;
    --label-primary: #f5f5f7;
    --label-secondary: #98989d;
    --label-tertiary: #636366;
    --separator: rgba(84, 84, 88, 0.65);
    --fill-quaternary: rgba(118, 118, 128, 0.18);

    --system-blue: #0a84ff;
    --system-blue-pressed: #409cff;
    --system-green: #30d158;
    --system-orange: #ff9f0a;
    --system-red: #ff453a;

    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.45);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.55);

    --mesh-1: rgba(10, 132, 255, 0.15);
    --mesh-2: rgba(48, 209, 88, 0.1);
    --mesh-3: rgba(255, 159, 10, 0.08);
  }
}

/* ── Streamlit App Shell ── */
.stApp {
  background: var(--bg-primary) !important;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Hiragino Sans", sans-serif !important;
  color: var(--label-primary) !important;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.stApp::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, var(--mesh-1), transparent),
    radial-gradient(ellipse 60% 40% at 90% 10%, var(--mesh-2), transparent),
    radial-gradient(ellipse 50% 30% at 50% 100%, var(--mesh-3), transparent);
}

.main .block-container {
  padding-top: 1.5rem;
  max-width: 980px;
  position: relative;
  z-index: 1;
}

/* ── Sidebar (macOS Vibrancy) ── */
[data-testid="stSidebar"] {
  background: var(--bg-secondary) !important;
  backdrop-filter: var(--blur-material);

  border-right: 0.5px solid var(--separator) !important;
}

[data-testid="stSidebar"] .block-container { padding-top: 1.25rem; }

header[data-testid="stHeader"] {
  background: var(--bg-secondary) !important;
  backdrop-filter: var(--blur-material);
  border-bottom: 0.5px solid var(--separator);
}

#MainMenu, footer, [data-testid="stToolbar"] { visibility: hidden; height: 0; }

/* ── Typography (Apple Type Scale) ── */
h1, h2, h3, h4 {
  font-weight: 600 !important;
  letter-spacing: -0.022em !important;
  color: var(--label-primary) !important;
}

.main-title {
  text-align: center;
  font-size: 2.125rem !important;
  font-weight: 700 !important;
  letter-spacing: -0.03em !important;
  color: var(--label-primary) !important;
  margin: 0 0 0.25rem !important;
  line-height: 1.1;
}

.hero-subtitle {
  text-align: center;
  color: var(--label-secondary);
  font-size: 1.0625rem;
  font-weight: 400;
  margin-bottom: 1.75rem;
  letter-spacing: -0.01em;
  line-height: 1.4;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: 0 auto 1rem;
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  background: var(--fill-quaternary);
  color: var(--label-secondary);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  backdrop-filter: var(--blur-material);
  border: 0.5px solid var(--separator);
}

.hero-wrap { text-align: center; margin-bottom: 0.5rem; }

/* ── Metrics (Widget Style) ── */
[data-testid="stMetric"] {
  background: var(--bg-secondary) !important;
  backdrop-filter: var(--blur-material);
  border: 0.5px solid var(--separator) !important;
  border-radius: var(--radius-lg) !important;
  padding: 16px 18px !important;
  box-shadow: var(--shadow-sm) !important;
  transition: transform 0.3s var(--spring), box-shadow 0.3s var(--ease);
}

[data-testid="stMetric"]:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md) !important;
}

[data-testid="stMetricLabel"] {
  font-size: 0.6875rem !important;
  font-weight: 600 !important;
  color: var(--label-secondary) !important;
  text-transform: uppercase !important;
  letter-spacing: 0.06em !important;
}

[data-testid="stMetricValue"] {
  font-size: 1.625rem !important;
  font-weight: 600 !important;
  letter-spacing: -0.03em !important;
  color: var(--label-primary) !important;
  font-variant-numeric: tabular-nums;
}

/* ── Buttons (iOS Pill) ── */
.stButton > button,
.stDownloadButton > button {
  border-radius: var(--radius-pill) !important;
  border: none !important;
  min-height: 44px !important;
  font-weight: 500 !important;
  font-size: 0.9375rem !important;
  padding: 0.625rem 1.375rem !important;
  transition: all 0.25s var(--spring) !important;
  box-shadow: none !important;
  font-family: inherit !important;
}

.stButton > button {
  background: var(--fill-quaternary) !important;
  color: var(--label-primary) !important;
}

.stButton > button:hover {
  background: rgba(120, 120, 128, 0.16) !important;
  transform: scale(1.02);
}

.stButton > button:active { transform: scale(0.98); }

.stButton > button[kind="primary"],
.stButton > button[data-testid="baseButton-primary"],
.stDownloadButton > button {
  background: var(--system-blue) !important;
  color: #ffffff !important;
}

.stButton > button[kind="primary"]:hover,
.stDownloadButton > button:hover {
  background: var(--system-blue-pressed) !important;
}

/* ── Segmented Control (Tabs) ── */
.stTabs [data-baseweb="tab-list"] {
  gap: 4px !important;
  background: var(--fill-quaternary) !important;
  border-radius: var(--radius-sm) !important;
  padding: 3px !important;
  border: 0.5px solid var(--separator);
}

.stTabs [data-baseweb="tab"] {
  border-radius: 8px !important;
  font-weight: 500 !important;
  font-size: 0.875rem !important;
  color: var(--label-secondary) !important;
  background: transparent !important;
  min-height: 36px;
  transition: all 0.25s var(--ease) !important;
}

.stTabs [aria-selected="true"] {
  background: var(--bg-grouped) !important;
  color: var(--label-primary) !important;
  box-shadow: var(--shadow-sm) !important;
}

/* ── Cards & Grouped Lists ── */
.stExpander,
.result-box,
.live-status,
.sidebar-live {
  background: var(--bg-secondary) !important;
  backdrop-filter: var(--blur-material);
  border: 0.5px solid var(--separator) !important;
  border-radius: var(--radius-lg) !important;
  box-shadow: var(--shadow-sm) !important;
}

.stExpander { overflow: hidden; }

.result-box { padding: 20px 22px !important; margin: 10px 0 !important; }

.sidebar-live {
  padding: 14px 16px !important;
  font-size: 0.8125rem !important;
  line-height: 1.55 !important;
  color: var(--label-secondary) !important;
}

.sidebar-live b { color: var(--label-primary) !important; font-weight: 600; }

/* ── Lottery Balls ── */
.ball {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 50px;
  height: 50px;
  margin: 5px;
  border-radius: 50%;
  background: var(--ball-gradient);
  color: #ffffff;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  box-shadow: 0 4px 14px rgba(224, 49, 49, 0.35), inset 0 1px 0 rgba(255,255,255,0.28);
  transition: transform 0.35s var(--spring);
  animation: ballAppear 0.5s var(--spring) backwards;
}

.ball:hover { transform: scale(1.08); }

.ball-row { text-align: center; padding: 18px 0; }

@keyframes ballAppear {
  from { opacity: 0; transform: scale(0.6) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── Live Status ── */
.live-status {
  padding: 14px 18px !important;
  margin: 8px 0 20px !important;
  font-size: 0.875rem !important;
  color: var(--system-green) !important;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  border-color: rgba(52, 199, 89, 0.25) !important;
}

.live-status b { color: var(--system-green); font-weight: 600; }

.pulse-dot {
  width: 8px;
  height: 8px;
  background: var(--system-green);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 10px rgba(52, 199, 89, 0.5);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.55; transform: scale(1.25); }
}

/* ── Forms (iOS Inputs) ── */
.stSelectbox > div > div,
.stMultiSelect > div > div,
.stNumberInput > div > div > input,
.stTextInput > div > div > input,
[data-baseweb="select"] > div {
  border-radius: var(--radius-md) !important;
  border: 0.5px solid var(--separator) !important;
  background: var(--bg-grouped) !important;
  min-height: 44px;
  font-family: inherit !important;
  color: var(--label-primary) !important;
}

.stSlider [data-baseweb="slider"] div[role="slider"] {
  background: var(--system-blue) !important;
}

/* ── Alerts (iOS Banner Style) ── */
div[data-testid="stSuccess"] {
  background: rgba(52, 199, 89, 0.12) !important;
  border: 0.5px solid rgba(52, 199, 89, 0.25) !important;
  border-radius: var(--radius-md) !important;
  color: var(--system-green) !important;
}

div[data-testid="stInfo"] {
  background: rgba(0, 122, 255, 0.1) !important;
  border: 0.5px solid rgba(0, 122, 255, 0.2) !important;
  border-radius: var(--radius-md) !important;
  color: var(--system-blue) !important;
}

div[data-testid="stWarning"] {
  background: rgba(255, 149, 0, 0.1) !important;
  border: 0.5px solid rgba(255, 149, 0, 0.22) !important;
  border-radius: var(--radius-md) !important;
}

[data-testid="stCode"] {
  background: var(--fill-quaternary) !important;
  border: 0.5px solid var(--separator) !important;
  border-radius: var(--radius-md) !important;
  font-family: "SF Mono", "Menlo", "Consolas", monospace !important;
  font-size: 0.8125rem !important;
}

[data-testid="stDataFrame"] {
  border-radius: var(--radius-md) !important;
  border: 0.5px solid var(--separator) !important;
  overflow: hidden;
}

div[data-testid="stCaptionContainer"] p {
  color: var(--label-secondary) !important;
  font-size: 0.8125rem !important;
}

hr {
  border: none !important;
  border-top: 0.5px solid var(--separator) !important;
  margin: 1.5rem 0 !important;
}

/* ── Accessibility ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ── Safe Area (iPhone) ── */
@supports (padding: env(safe-area-inset-top)) {
  .main .block-container {
    padding-left: max(1rem, env(safe-area-inset-left));
    padding-right: max(1rem, env(safe-area-inset-right));
    padding-bottom: max(1rem, env(safe-area-inset-bottom));
  }
}

/* ── Standalone HTML extras ── */
html { color-scheme: light dark; }

body.apple-body {
  background: var(--bg-primary);
  color: var(--label-primary);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Hiragino Sans", sans-serif;
  min-height: 100vh;
  padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(48px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
  -webkit-font-smoothing: antialiased;
  position: relative;
}

body.apple-body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, var(--mesh-1), transparent),
    radial-gradient(ellipse 60% 40% at 90% 10%, var(--mesh-2), transparent),
    radial-gradient(ellipse 50% 30% at 50% 100%, var(--mesh-3), transparent);
}

.apple-container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

.apple-card {
  background: var(--bg-secondary);
  backdrop-filter: var(--blur-material);
  border: 0.5px solid var(--separator);
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 16px;
}

.apple-card h2 {
  font-size: 1.0625rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 14px;
}

.apple-metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.apple-metric {
  background: var(--bg-secondary);
  backdrop-filter: var(--blur-material);
  border: 0.5px solid var(--separator);
  border-radius: var(--radius-lg);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: transform 0.3s var(--spring);
}

.apple-metric:hover { transform: translateY(-2px); }

.apple-metric .label {
  font-size: 0.6875rem;
  font-weight: 600;
  color: var(--label-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.apple-metric .value {
  font-size: 1.375rem;
  font-weight: 600;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}

.apple-notice {
  background: var(--bg-secondary);
  backdrop-filter: var(--blur-material);
  border: 0.5px solid var(--separator);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  font-size: 0.8125rem;
  color: var(--label-secondary);
  margin-bottom: 20px;
  line-height: 1.5;
}

.apple-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  background: var(--fill-quaternary);
  border-radius: var(--radius-sm);
  padding: 3px;
  border: 0.5px solid var(--separator);
}

.apple-tab {
  flex: 1;
  min-width: 120px;
  min-height: 44px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--label-secondary);
  transition: all 0.25s var(--ease);
  font-family: inherit;
}

.apple-tab.active {
  background: var(--bg-grouped);
  color: var(--label-primary);
  box-shadow: var(--shadow-sm);
}

.apple-btn {
  padding: 12px 18px;
  min-height: 44px;
  border: none;
  border-radius: var(--radius-pill);
  background: var(--fill-quaternary);
  cursor: pointer;
  font-size: 0.9375rem;
  font-weight: 500;
  color: var(--label-primary);
  transition: all 0.25s var(--spring);
  font-family: inherit;
}

.apple-btn:active { transform: scale(0.97); }
.apple-btn-primary { background: var(--system-blue); color: #fff; }
.apple-btn-primary:hover { background: var(--system-blue-pressed); }

.apple-btn-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.apple-action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.apple-action-row .apple-btn { flex: 1; min-width: 140px; }

.apple-result-box {
  background: var(--fill-quaternary);
  border: 0.5px solid var(--separator);
  border-radius: var(--radius-md);
  padding: 18px;
  margin-bottom: 12px;
}

.apple-bar-track { flex: 1; height: 8px; background: var(--fill-quaternary); border-radius: 4px; overflow: hidden; }

.apple-footer {

  font-size: 0.75rem;

}

.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeIn 0.35s var(--ease); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 0.8125rem; }
.bar-label { width: 36px; text-align: right; flex-shrink: 0; font-weight: 500; font-variant-numeric: tabular-nums; }

.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
th, td { padding: 11px 14px; border-bottom: 0.5px solid var(--separator); }
th {

}

.copy-text { font-size: 0.8125rem; color: var(--system-green); margin-top: 10px; font-weight: 500; }
.hint { text-align: center; color: var(--label-secondary); padding: 32px; font-size: 0.9375rem; }

</style>

  }

  get latest() {
    return this.draws[this.draws.length - 1] || null;
  }

  frequency(includeBonus = true) {
    if (this._freq) return this._freq;
    const c = {};
    for (let n = 1; n <= 43; n++) c[n] = 0;
    for (const d of this.draws) {
      for (const n of d.n) c[n]++;
      if (includeBonus) c[d.b]++;
    }
    this._freq = c;
    return c;
  }

  recentFrequency(lastN = 50, includeBonus = true) {
    const c = {};
    for (let n = 1; n <= 43; n++) c[n] = 0;
    for (const d of this.draws.slice(-lastN)) {
      for (const n of d.n) c[n]++;
      if (includeBonus) c[d.b]++;
    }
    return c;
  }

  lastSeenGap() {
    if (this._gaps) return this._gaps;
    const gaps = {};
    for (let n = 1; n <= 43; n++) gaps[n] = this.draws.length;
    for (let i = this.draws.length - 1; i >= 0; i--) {
      const d = this.draws[i];
      const elapsed = this.draws.length - 1 - i;
      for (const n of d.n) {
        if (gaps[n] === this.draws.length) gaps[n] = elapsed;
      }
      if (gaps[d.b] === this.draws.length) gaps[d.b] = elapsed;
    }
    this._gaps = gaps;
    return gaps;
  }

  pairFrequency() {
    if (this._pairs) return this._pairs;
    const c = new Map();
    for (const d of this.draws) {
      const sorted = [...d.n].sort((a, b) => a - b);
      for (let i = 0; i < sorted.length; i++) {
        for (let j = i + 1; j < sorted.length; j++) {
          const key = `${sorted[i]}-${sorted[j]}`;
          c.set(key, (c.get(key) || 0) + 1);
        }
      }
    }
    this._pairs = c;
    return c;
  }

  topNumbers(n = 10, lastN = null) {
    const freq = lastN ? this.recentFrequency(lastN) : this.frequency();
    return Object.entries(freq)
      .map(([num, count]) => [+num, count])
      .sort((a, b) => b[1] - a[1])
      .slice(0, n);
  }

  overdueNumbers(n = 10) {
    const gaps = this.lastSeenGap();
    return Object.entries(gaps)
      .map(([num, gap]) => [+num, gap])
      .sort((a, b) => b[1] - a[1])
      .slice(0, n);
  }

  numberScores(lastN = 100) {
    const allFreq = this.frequency();
    const recent = this.recentFrequency(lastN);
    const gaps = this.lastSeenGap();
    const maxAll = Math.max(...Object.values(allFreq)) || 1;
    const maxRecent = Math.max(...Object.values(recent)) || 1;
    const maxGap = Math.max(...Object.values(gaps)) || 1;
    const scores = {};
    for (let num = 1; num <= 43; num++) {
      scores[num] =
        (allFreq[num] / maxAll) * 0.25 +
        (recent[num] / maxRecent) * 0.45 +
        (gaps[num] / maxGap) * 0.3;
    }
    return scores;
  }

  oddEvenDistribution() {
    const dist = {};
    for (let i = 0; i <= 6; i++) dist[i] = 0;
    for (const d of this.draws) {
      const odd = d.n.filter((x) => x % 2 === 1).length;
      dist[odd]++;
    }
    const total = this.draws.length;
    const result = {};
    for (const [k, v] of Object.entries(dist)) {
      result[`奇数${k}個`] = (v / total) * 100;
    }
    return result;
  }

  sumRangeStats() {
    const sums = this.draws.map((d) => d.n.reduce((a, b) => a + b, 0));
    return {
      平均: sums.reduce((a, b) => a + b, 0) / sums.length,
      最小: Math.min(...sums),
      最大: Math.max(...sums),
    };
  }
}

function formatNumbers(nums) {
  return [...nums].sort((a, b) => a - b).map((n) => String(n).padStart(2, "0")).join(" ");
}

function isBalanced(nums) {
  const odd = nums.filter((n) => n % 2 === 1).length;
  if (odd === 0 || odd === 6) return false;
  const total = nums.reduce((a, b) => a + b, 0);
  if (total < 80 || total > 220) return false;
  const low = nums.filter((n) => n <= 22).length;
  if (low === 0 || low === 6) return false;
  const sorted = [...nums].sort((a, b) => a - b);
  let consecutive = 0;
  for (let i = 0; i < sorted.length - 1; i++) {
    if (sorted[i + 1] - sorted[i] === 1) consecutive++;
  }
  return consecutive <= 3;
}

function pickFromScores(analyzer, scores, seed = null) {
  const rng = new SeededRNG(seed ?? Date.now());
  const ranked = Object.entries(scores)
    .map(([n, s]) => [+n, s])
    .sort((a, b) => b[1] - a[1]);
  const pool = ranked.slice(0, 18).map(([n]) => n);
  const weights = pool.map((n) => scores[n]);

  for (let t = 0; t < 500; t++) {
    const chosen = rng.choices(pool, weights, 12);
    const unique = [...new Set(chosen)];
    if (unique.length >= 6) {
      const candidate = rng.sample(unique.slice(0, 10), 6);
      if (isBalanced(candidate)) return candidate;
    }
  }
  return ranked.slice(0, 6).map(([n]) => n);
}

function makeResult(name, description, numbers, extra = {}) {
  return { name, description, numbers, formatted: formatNumbers(numbers), ...extra };
}

const Strategies = {
  composite(analyzer, seed) {
    const scores = analyzer.numberScores(100);
    const nums = pickFromScores(analyzer, scores, seed);
    return makeResult(
      "複合スコア法（おすすめ）",
      "出現頻度・直近傾向・出遅れを総合的に評価します",
      nums
    );
  },
  hot(analyzer, seed) {
    const scores = {};
    for (let n = 1; n <= 43; n++) scores[n] = 0;
    analyzer.topNumbers(15).forEach(([n, c]) => (scores[n] = c));
    return makeResult(
      "ホットナンバー法",
      "過去全体で出現回数が多い数字を中心に選びます",
      pickFromScores(analyzer, scores, seed)
    );
  },
  recent(analyzer, seed) {
    const scores = {};
    for (let n = 1; n <= 43; n++) scores[n] = 0;
    analyzer.topNumbers(15, 50).forEach(([n, c]) => (scores[n] = c * 2));
    return makeResult(
      "直近トレンド法",
      "直近50回でよく出ている数字を重視します",
      pickFromScores(analyzer, scores, seed)
    );
  },
  overdue(analyzer, seed) {
    const scores = {};
    for (let n = 1; n <= 43; n++) scores[n] = 0;
    analyzer.overdueNumbers(15).forEach(([n, gap]) => (scores[n] = gap));
    return makeResult(
      "間隔分析（出遅れ）法",
      "長期間出ていない数字が出るという考え方に基づきます",
      pickFromScores(analyzer, scores, seed)
    );
  },
  pair(analyzer, seed) {
    const rng = new SeededRNG(seed ?? Date.now());
    const pairs = analyzer.pairFrequency();
    const topPairs = [...pairs.entries()]
      .map(([key, count]) => ({ pair: key.split("-").map(Number), count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 30);
    const shuffled = rng.shuffle(topPairs);
    const nums = new Set();
    for (const { pair } of shuffled) {
      nums.add(pair[0]);
      nums.add(pair[1]);
      if (nums.size >= 6) break;
    }
    if (nums.size < 6) {
      analyzer.topNumbers(6).forEach(([n]) => nums.add(n));
    }
    const result = [...nums].sort((a, b) => a - b).slice(0, 6);
    return makeResult(
      "相性ペア法",
      "過去に一緒に出やすい数字のペアを組み合わせます",
      result
    );
  },
  elimination(analyzer, seed) {
    const freq = analyzer.frequency();
    const recent = analyzer.recentFrequency(100);
    const sortedVals = Object.values(freq).sort((a, b) => a - b);
    const threshold = sortedVals[10];
    const eliminated = [];
    for (let n = 1; n <= 43; n++) {
      if (freq[n] <= threshold && recent[n] <= 2) eliminated.push(n);
    }
    const scores = analyzer.numberScores();
    const filtered = {};
    for (let n = 1; n <= 43; n++) {
      if (!eliminated.includes(n)) filtered[n] = scores[n];
    }
    return makeResult(
      "消去法",
      "出にくい数字を除外し、残りから選びます",
      pickFromScores(analyzer, filtered, seed),
      { eliminated }
    );
  },
  balanced(analyzer, seed) {
    const rng = new SeededRNG(seed ?? Date.now());
    const scores = analyzer.numberScores();
    const ranked = Object.entries(scores)
      .map(([n, s]) => [+n, s])
      .sort((a, b) => b[1] - a[1])
      .map(([n]) => n);

    for (let t = 0; t < 1000; t++) {
      const odds = ranked.filter((n) => n % 2 === 1).slice(0, 12);
      const evens = ranked.filter((n) => n % 2 === 0).slice(0, 12);
      const pick = new Set();
      rng.sample(odds, Math.min(3, odds.length)).forEach((n) => pick.add(n));
      rng.sample(evens, Math.min(3, evens.length)).forEach((n) => pick.add(n));
      while (pick.size < 6) pick.add(rng.choice(ranked.slice(0, 20)));
      const nums = [...pick].slice(0, 6);
      if (isBalanced(nums)) {
        return makeResult(
          "バランス配分法",
          "奇数/偶数・小/大のバランスを考慮して選びます",
          nums
        );
      }
    }
    return makeResult(
      "バランス配分法",
      "奇数/偶数・小/大のバランスを考慮して選びます",
      ranked.slice(0, 6)
    );
  },
};

const STRATEGY_LIST = [
  { key: "composite", label: "複合スコア法（おすすめ）" },
  { key: "hot", label: "ホットナンバー法" },
  { key: "recent", label: "直近トレンド法" },
  { key: "overdue", label: "間隔分析（出遅れ）法" },
  { key: "pair", label: "相性ペア法" },
  { key: "elimination", label: "消去法" },
  { key: "balanced", label: "バランス配分法" },
];

function generateAll(analyzer, seed) {
  return STRATEGY_LIST.map(({ key }) => Strategies[key](analyzer, seed));
}

function renderBalls(nums) {
  return nums
    .sort((a, b) => a - b)
    .map((n) => `<span class="ball">${String(n).padStart(2, "0")}</span>`)
    .join("");
}

function renderBarChart(containerId, data, labelKey = "label", valueKey = "value") {
  const el = document.getElementById(containerId);
  if (!el) return;
  const max = Math.max(...data.map((d) => d[valueKey]), 1);
  el.innerHTML = data
    .map(
      (d) => `
    <div class="bar-row">
      <span class="bar-label">${d[labelKey]}</span>
      <div class="apple-bar-track"><div class="apple-bar-fill" style="width:${(d[valueKey] / max) * 100}%"></div></div>
      <span class="bar-value">${d[valueKey]}</span>
    </div>`
    )
    .join("");
}

function renderPrediction(container, pred) {
  let html = `<div class="apple-result-box">
    <h3>${pred.name}</h3>
    <p class="desc">${pred.description}</p>
    <div class="ball-row">${renderBalls(pred.numbers)}</div>
    <p class="copy-text">コピー用: ${pred.formatted}</p>`;
  if (pred.eliminated && pred.eliminated.length) {
    html += `<p class="eliminated">除外候補: ${pred.eliminated.slice(0, 12).map((n) => String(n).padStart(2, "0")).join(" ")}</p>`;
  }
  html += "</div>";
  container.innerHTML = html;
}

function renderAllPredictions(container, preds) {
  container.innerHTML = preds
    .map(
      (pred) => `<div class="apple-result-box">
      <h3>${pred.name}</h3>
      <p class="desc">${pred.description}</p>
      <div class="ball-row">${renderBalls(pred.numbers)}</div>
      <p class="copy-text">コピー用: ${pred.formatted}</p>
    </div>`
    )
    .join("");
}

let analyzer = null;
let currentKey = null;
let currentSeed = Date.now() % 1000000;

function initApp() {
  if (typeof LOTODATA === "undefined" || !LOTODATA.draws) {
    document.body.innerHTML = "<p style='padding:2rem'>データが読み込めません。build_standalone.py を実行してください。</p>";
    return;
  }

  analyzer = new Loto6Analyzer(LOTODATA.draws);
  const latest = analyzer.latest;

  document.getElementById("meta-rounds").textContent = `${analyzer.totalRounds} 回`;
  document.getElementById("meta-latest-round").textContent = latest ? `第 ${latest.r} 回` : "-";
  document.getElementById("meta-latest-date").textContent = latest ? latest.d : "-";
  document.getElementById("meta-updated").textContent = LOTODATA.updated || "-";

  if (latest) {
    document.getElementById("latest-balls").innerHTML = renderBalls(latest.n);
    document.getElementById("latest-bonus").textContent = `ボーナス: ${String(latest.b).padStart(2, "0")}`;
  }

  const btnArea = document.getElementById("strategy-buttons");
  STRATEGY_LIST.forEach(({ key, label }) => {
    const btn = document.createElement("button");
    btn.className = "apple-btn";
    btn.textContent = label;
    btn.onclick = () => {
      currentKey = key;
      currentSeed = Date.now() % 1000000;
      renderPrediction(document.getElementById("results"), Strategies[key](analyzer, currentSeed));
    };
    btnArea.appendChild(btn);
  });

  document.getElementById("btn-recommend").onclick = () => {
    currentKey = "composite";
    currentSeed = Date.now() % 1000000;
    renderPrediction(document.getElementById("results"), Strategies.composite(analyzer, currentSeed));
  };

  document.getElementById("btn-all").onclick = () => {
    currentKey = null;
    currentSeed = Date.now() % 1000000;
    renderAllPredictions(document.getElementById("results"), generateAll(analyzer, currentSeed));
  };

  document.getElementById("btn-reroll").onclick = () => {
    currentSeed = Date.now() % 1000000;
    if (currentKey) {
      renderPrediction(document.getElementById("results"), Strategies[currentKey](analyzer, currentSeed));
    } else {
      renderAllPredictions(document.getElementById("results"), generateAll(analyzer, currentSeed));
    }
  };

  document.querySelectorAll(".apple-tab").forEach((tab) => {
    tab.onclick = () => {
      document.querySelectorAll(".apple-tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach((p) => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(tab.dataset.panel).classList.add("active");
      if (tab.dataset.panel === "panel-stats") renderStats();
    };
  });
}

function renderStats() {
  const freq = analyzer.frequency();
  renderBarChart(
    "chart-all",
    analyzer.topNumbers(20).map(([n, c]) => ({ label: String(n).padStart(2, "0"), value: c }))
  );
  renderBarChart(
    "chart-recent",
    analyzer.topNumbers(20, 50).map(([n, c]) => ({ label: String(n).padStart(2, "0"), value: c }))
  );
  renderBarChart(
    "chart-heat",
    Object.entries(freq)
      .map(([n, c]) => ({ label: String(n).padStart(2, "0"), value: c }))
      .sort((a, b) => a.label.localeCompare(b.label))
  );

  const overdueEl = document.getElementById("overdue-table");
  overdueEl.innerHTML = analyzer
    .overdueNumbers(15)
    .map(([n, gap]) => `<tr><td>${String(n).padStart(2, "0")}</td><td>${gap}回前</td></tr>`)
    .join("");

  const oddDist = analyzer.oddEvenDistribution();
  renderBarChart(
    "chart-odd",
    Object.entries(oddDist).map(([k, v]) => ({ label: k, value: Math.round(v * 10) / 10 }))
  );

  const sum = analyzer.sumRangeStats();
  document.getElementById("sum-stats").textContent =
    `本数字合計: 平均 ${sum.平均.toFixed(1)} / 最小 ${sum.最小} / 最大 ${sum.最大}`;
}

document.addEventListener("DOMContentLoaded", initApp);

</script>
</body>
</html>
